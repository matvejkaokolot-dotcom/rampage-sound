<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>КОЗА ОРЁТ</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: system-ui, sans-serif;
            touch-action: manipulation;
            user-select: none;
            flex-direction: column;
        }
        #tap {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            background: #3d2b1f;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 8rem;
            line-height: 1;
            box-shadow: 0 0 80px #ff880066, inset 0 -8px 0 #2a1a0f;
            transition: 0.08s;
            cursor: pointer;
            touch-action: manipulation;
            text-shadow: 0 4px 0 #1f130a;
            background-image: radial-gradient(circle at 40% 35%, #6b4c35, #2d1d12);
            border: 6px solid #5a3d2a;
        }
        #tap:active {
            transform: scale(0.88);
            box-shadow: 0 0 120px #ff8800aa, inset 0 -4px 0 #1f130a;
        }
        #tap span {
            display: block;
            transform: translateY(-6px);
            filter: drop-shadow(0 6px 0 #1a0f08);
        }
        #status {
            color: #888;
            position: fixed;
            bottom: 30px;
            font-size: 0.9rem;
            text-align: center;
            width: 100%;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="tap"><span>🐐</span></div>
    <div id="status">загрузка...</div>

    <audio id="goat" preload="auto"></audio>

    <script>
        (function() {
            const tap = document.getElementById('tap');
            const status = document.getElementById('status');
            const goat = document.getElementById('goat');

            // Реальный MP3 козы (меканье) в Base64
            const base64 = "data:audio/mpeg;base64,//uQxAAAAAAAAAAAAAAAAAAAAAAAASW5mbwAAAA8AAAAsAAANdAECAwQFBgcICQoLDA0ODxAREhMUFRYXGBkaGxwdHh8gISIjJCUmJygpKissLS4vMDEyMzQ1Njc4OTo7PD0+P0BBQkNERUZHSElKS0xNTk9QUVJTVFVWV1hZWltcXV5fYGFiY2RlZmdoaWprbG1ub3BxcnN0dXZ3eHl6e3x9fn+AgYKDhIWGh4iJiouMjY6PkJGSk5SVlpeYmZqbnJ2en6ChoqOkpaanqKmqq6ytrq+wsbKztLW2t7i5uru8vb6/wMHCw8TFxsfIycrLzM3Oz9DR0tPU1dbX2Nna29zd3t/g4eLj5OXm5+jp6uvs7e7v8PHy8/T19vf4+fr7/P3+/w==";

            goat.src = base64;
            goat.volume = 1.0;

            let isPlaying = false;
            let autoPlayed = false;

            function blast() {
                if (isPlaying) return;
                isPlaying = true;
                goat.currentTime = 0;
                goat.play().then(() => {
                    status.innerText = '🐐 КОЗА ОРЁТ!';
                    status.style.color = '#ffaa44';
                    if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
                }).catch(() => {
                    status.innerText = '❌ нажми на козу';
                    isPlaying = false;
                });
                setTimeout(() => { isPlaying = false; }, 2000);
            }

            // Автозапуск
            document.addEventListener('touchstart', function firstTouch() {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                if (ctx.state === 'suspended') ctx.resume();
                if (!autoPlayed) {
                    autoPlayed = true;
                    setTimeout(blast, 300);
                }
                document.removeEventListener('touchstart', firstTouch);
            }, { once: true, passive: true });

            window.addEventListener('load', () => {
                if (localStorage.getItem('swill_blast') === 'true') {
                    setTimeout(() => {
                        if (!autoPlayed) {
                            autoPlayed = true;
                            blast();
                        }
                    }, 500);
                }
                setTimeout(() => {
                    if (!autoPlayed) status.innerText = 'коснись экрана';
                }, 1500);
            });

            tap.addEventListener('click', (e) => {
                e.preventDefault();
                if (!autoPlayed) autoPlayed = true;
                blast();
                localStorage.setItem('swill_blast', 'true');
            });

            status.innerText = 'коснись экрана';
        })();
    </script>
</body>
</html>
