<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>КОЗА ОРЁТ</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: system-ui, sans-serif;
            touch-action: manipulation;
            user-select: none;
        }
        #tap {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            background: #3d2b1f;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 8rem;
            line-height: 1;
            box-shadow: 0 0 80px #ff880066, inset 0 -8px 0 #2a1a0f;
            transition: 0.08s;
            cursor: pointer;
            touch-action: manipulation;
            text-shadow: 0 4px 0 #1f130a;
            background-image: radial-gradient(circle at 40% 35%, #6b4c35, #2d1d12);
            border: 6px solid #5a3d2a;
        }
        #tap:active {
            transform: scale(0.88);
            box-shadow: 0 0 120px #ff8800aa, inset 0 -4px 0 #1f130a;
        }
        #tap span {
            display: block;
            transform: translateY(-6px);
            filter: drop-shadow(0 6px 0 #1a0f08);
        }
        #status {
            color: #888;
            position: fixed;
            bottom: 30px;
            font-size: 0.9rem;
            text-align: center;
            width: 100%;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="tap"><span>🐐</span></div>
    <div id="status">нажми на козу</div>

    <script>
        (function() {
            const tap = document.getElementById('tap');
            const status = document.getElementById('status');

            let isPlaying = false;

            function goatSound() {
                if (isPlaying) return;
                isPlaying = true;

                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                if (ctx.state === 'suspended') ctx.resume();
                const now = ctx.currentTime;

                // Коза — 3 "мека" подряд с паузами, каждое с вибрато и спадающей громкостью
                const bleats = 3;
                for (let b = 0; b < bleats; b++) {
                    const start = now + b * 0.35;
                    const duration = 0.25 + Math.random() * 0.08;

                    // Основной тон (голос козы) — от 600 до 1200 Гц с "дрожью"
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'sawtooth';
                    // Вибрато — небольшая качка частоты
                    const baseFreq = 700 + Math.random() * 300;
                    osc.frequency.setValueAtTime(baseFreq, start);
                    osc.frequency.exponentialRampToValueAtTime(baseFreq * 1.4, start + duration * 0.2);
                    osc.frequency.exponentialRampToValueAtTime(baseFreq * 0.7, start + duration * 0.6);
                    osc.frequency.exponentialRampToValueAtTime(baseFreq * 1.1, start + duration);

                    gain.gain.setValueAtTime(0.7 + Math.random() * 0.3, start);
                    gain.gain.exponentialRampToValueAtTime(0.01, start + duration);
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start(start);
                    osc.stop(start + duration);

                    // Второй тон — более высокий, "блеющий" (как меканье)
                    const osc2 = ctx.createOscillator();
                    const gain2 = ctx.createGain();
                    osc2.type = 'square';
                    const baseFreq2 = baseFreq * 1.6 + Math.random() * 200;
                    osc2.frequency.setValueAtTime(baseFreq2, start);
                    osc2.frequency.exponentialRampToValueAtTime(baseFreq2 * 0.5, start + duration * 0.5);
                    osc2.frequency.exponentialRampToValueAtTime(baseFreq2 * 0.8, start + duration);
                    gain2.gain.setValueAtTime(0.3 + Math.random() * 0.2, start);
                    gain2.gain.exponentialRampToValueAtTime(0.01, start + duration);
                    osc2.connect(gain2);
                    gain2.connect(ctx.destination);
                    osc2.start(start);
                    osc2.stop(start + duration);

                    // Шумовой "хрип" — чтобы звук был живым, как у настоящей козы
                    const buf = ctx.createBuffer(1, ctx.sampleRate * 0.06, ctx.sampleRate);
                    const d = buf.getChannelData(0);
                    for (let i = 0; i < d.length; i++) {
                        d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (d.length * 0.4));
                    }
                    const noise = ctx.createBufferSource();
                    noise.buffer = buf;
                    const g3 = ctx.createGain();
                    g3.gain.setValueAtTime(0.2 + Math.random() * 0.2, start);
                    g3.gain.exponentialRampToValueAtTime(0.001, start + duration);
                    noise.connect(g3);
                    g3.connect(ctx.destination);
                    noise.start(start);
                    noise.stop(start + duration);
                }

                status.innerText = '🐐 КОЗА ОРЁТ!';
                status.style.color = '#ffaa44';
                if (navigator.vibrate) {
                    navigator.vibrate([100, 40, 80, 40, 120]);
                }

                setTimeout(() => {
                    isPlaying = false;
                }, 1500);
            }

            tap.addEventListener('click', (e) => {
                e.preventDefault();
                goatSound();
                localStorage.setItem('swill_blast', 'true');
            });

            window.addEventListener('load', () => {
                setTimeout(() => {
                    if (localStorage.getItem('swill_blast') === 'true') tap.click();
                }, 400);
            });

            document.addEventListener('touchstart', () => {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                if (ctx.state === 'suspended') ctx.resume();
            }, { once: true, passive: true });

            status.innerText = 'нажми на козу';
        })();
    </script>
</body>
</html>
